<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prism Planner</title>
    <meta
      name="description"
      content="A local-first day planner that refracts each task into focus, energy, and mood."
    />
    <link rel="stylesheet" href="styles/tokens.css" />
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <main id="app">
      <header class="app-header">
        <div class="brand">
          <svg
            class="brand-mark"
            width="32"
            height="32"
            viewBox="0 0 32 32"
            aria-hidden="true"
          >
            <polygon
              points="16,3 29,26 3,26"
              fill="none"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linejoin="round"
            />
            <line x1="3" y1="26" x2="14" y2="14" stroke="var(--facet-focus)" stroke-width="1.6" />
            <line x1="29" y1="26" x2="18" y2="14" stroke="var(--facet-energy)" stroke-width="1.6" />
            <line x1="16" y1="3" x2="16" y2="14" stroke="var(--facet-mood)" stroke-width="1.6" />
          </svg>
          <h1>Prism Planner</h1>
        </div>
        <p class="tagline">Refract your day into focus, energy, and mood.</p>
      </header>

      <section id="task-area" aria-label="Tasks">
        <p class="placeholder">App scaffolding — wiring coming next.</p>
      </section>
    </main>
  </body>
</html>
